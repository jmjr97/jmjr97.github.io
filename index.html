<!DOCTYPE html>

<html>
	<head>
			<meta charset='UTF-8'>
			<link rel='stylesheet' href='style.css'>
			<title>Home Page</title>
			<script src='main.js' defer></script>
			<link rel='preconnect' href='https://fonts.googleapis.com'><link rel='preconnect' href='https://fonts.gstatic.com' crossorigin><link href='https://fonts.googleapis.com/css2?family=Inter:wght@500&display=swap' rel='stylesheet'>
	</head>
	<body>
		<div class=frame>
			<div class=header>
				<div class='dateTime'>
					<div class='time'></div>
					<div class='date'></div>
				</div>
				<div class=h-spacer>
					<p id="testing"></p>
				</div>
				<div class=weather>
					<img id="w-icon" width="75" height="75"></img>
					<p id="w-info"></p>
				</div>
			</div>
			<div class='quick-links'>
				<span class='button-span'>
					<a href='http://youtube.com'>
						<div class='main-button'>
							<img class='link-img' src='img/links/youtube.png'>
						</div>
					</a>
					<a href='http://amazon.com'>
						<div class='main-button'>
							<img class='link-img' src='img/links/amazon.png'>
						</div>
					</a>
					<a href='http://pnc.com'>
						<div class='main-button'>
							<img class='link-img' src='img/links/pnc.png'>
						</div>
					</a>
					<a href='http://mintmobile.com'>
						<div class='main-button'>
							<img class='link-img' src='img/links/mint.png'>
						</div>
					</a>
					<a href='http://reddit.com'>
						<div class='main-button'>
							<img class='link-img' src='img/links/reddit.png'>
						</div>
					</a>
					<a href='http://github.com'>
						<div class='main-button'>
							<img class='link-img' src='img/links/github.png'>
						</div>
					</a>
					<a href='http://spotify.com'>
						<div class='main-button'>
							<img class='link-img' src='img/links/spotify.png'>
						</div>
					</a>
					<a href='https://gemini.google.com/app'>
						<div class='main-button'>
							<img class='link-img' src='img/links/gemini.png'>
						</div>
					</a>
				</span>
			</div>
			<div class='columns'>
				<div class='left-frame'>
					<div class='link-box-flex'>
						<label class='box-title'>Google</label>
							<div class='link-div-l'>
								<a href='http://gmail.com'><img class='link-icon' src='img/links/gmail.png'/> Gmail</a>
								<a href='http://messages.google.com'><img class='link-icon' src='img/links/message.png'/> Messages</a>
								<a href='http://calendar.google.com'><img class='link-icon' src='img/links/calendar.png'/> Calendar</a>
								<a href='http://drive.google.com'><img class='link-icon' src='img/links/drive.png'/> Drive</a>
							</div>
							<div class='link-div-r'>
								<a href='http://contacts.google.com'><img class='link-icon' src='img/links/contacts.png'/> Contacts</a>
								<a href='http://familylink.google.com'><img class='link-icon' src='img/links/family.png'/> Family Link</a>
								<a href='http://google.com/maps'><img class='link-icon' src='img/links/maps.png'/> Maps</a>
								<a href='http://keep.google.com'><img class='link-icon' src='img/links/keep.png'/> Keep</a>
							</div>
					</div>
					<div class='link-box'>
						<label class='box-title'>D&D</label>
						<a href='http://dndbeyond.com'>Dnd Beyond</a>
						<a href='http://jmjr97.github.io/dm-tools/index.html'>DM Tools</a>
						<a href='https://www.dndbeyond.com/characters/120891087'>Qoma</a>
						<a href='https://www.dndbeyond.com/characters/144566959'>Xyther</a>
						<a href='https://www.dndbeyond.com/characters/150936279'>Felin</a>
					</div>
				</div>
				<div class='mid-frame'>
					<div class='link-box-flex'>
						<label class='box-title'>Streaming</label>
						<div class='link-div-l'>
							<a href='http://netflix.com'><img class='link-icon' src='img/links/netflix.png'/> Netflix</a>
							<a href='http://hulu.com'><img class='link-icon' src='img/links/hulu.png'/> Hulu</a>
							<a href='http://amazon.com/gp/video/storefront'><img class='link-icon' src='img/links/prime.png'/> Prime Video</a>
							<a href='http://max.com'><img class='link-icon' src='img/links/max.png'/> HBO</a>
						</div>
						<div class='link-div-r'>
							<a href='http://crunchyroll.com'><img class='link-icon' src='img/links/crunchy.png'/> Crunchy Roll</a>
							<a href='http://plutotv.com'><img class='link-icon' src='img/links/pluto.png'/> Pluto TV</a>
							<a href='http://therokuchannel.roku.com'><img class='link-icon' src='img/links/roku.png'/> Roku</a>
						</div>
					</div>
					<div class='link-box'>
						<label class='box-title'>Gaming</label>
						<a href='http://steampowered.com'><img class='link-icon' src='img/links/steam.png'/> Steam</a>
						<a href='http://protondb.com'><img class='link-icon' src='img/links/proton.png'/> Proton</a>
						<a href='http://nintendo.com'><img class='link-icon' src='img/links/nintendo.png'/> Nintendo</a>
					</div>
				</div>
				<div class='right-frame'>
					<div class='link-box'>
						<label class='box-title'>Linux</label>
						<a href='http://archlinux.org/'>Arch Linux</a>
						<a href='http://wiki.archlinux.org'>Arch Wiki</a>
					</div>
					<div class='link-box'>
						<label class='box-title'>School</label>
						<a href='http://bcps.org'><img class='link-icon' src='img/links/bcps.png'/> BCPS</a>
						<a href='http://chesapeakehs.bcps.org'><img class='link-icon' src='img/links/chs.png'/> Chesapeake High</a>
						<a href='http://bcps.schoology.com'><img class='link-icon' src='img/links/schoology.png'/> Schoology</a>
						<a href='http://buswhere.com'><img class='link-icon' src='img/links/bus.png'/> BusWhere</a>
					</div>
				</div>
			</div>
		</div>
	</body>
</html>
