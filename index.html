<!DOCTYPE html>

<html>
	<head>
			<meta charset='UTF-8'>
			<link rel='stylesheet' href='style.css'>
			<title>Home Page</title>
			<script src='main.js' defer></script>
			<link rel='preconnect' href='https://fonts.googleapis.com'><link rel='preconnect' href='https://fonts.gstatic.com' crossorigin><link href='https://fonts.googleapis.com/css2?family=Inter:wght@500&display=swap' rel='stylesheet'>
	</head>
	<body>
		<div class=frame>
			<div class=header>
				<div class='dateTime'>
					<div class='time'></div>
					<div class='date'></div>
				</div>
				<div class=h-spacer>
					<p id="testing"></p>
				</div>
				<div class=weather>
					<img id="w-icon" width="75" height="75"></img>
					<p id="w-info"></p>
				</div>
			</div>
			<div class='quick-links'> <!-- quick link bar -->
				<div class='main-button'>
					<a href='http://youtube.com'>
						<img class='quick-link-img' src='img/links/youtube.png'>
					</a>
				</div>
				<div class='main-button'>
					<a href='http://amazon.com'>
						<img class='quick-link-img' src='img/links/amazon.png'>
					</a>
				</div>
				<div class='main-button'>
					<a href='http://pnc.com'>
						<img class='quick-link-img' src='img/links/pnc.png'>
					</a>
				</div>
				<div class='main-button'>
					<a href='http://mintmobile.com'>
						<img class='quick-link-img' src='img/links/mint.png'>
					</a>
				</div>
				<div class='main-button'>
					<a href='http://reddit.com'>
						<img class='quick-link-img' src='img/links/reddit.png'>
					</a>
				</div>
				<div class='main-button'>
					<a href='http://github.com'>
						<img class='quick-link-img' src='img/links/github.png'>
					</a>
				</div>
				<div class='main-button'>
					<a href='http://spotify.com'>
						<img class='quick-link-img' src='img/links/spotify.png'>
					</a>
				</div>
				<div class='main-button'>
					<a href='https://gemini.google.com/app'>
						<img class='quick-link-img' src='img/links/gemini.png'>
					</a>
				</div>
			</div>
			<div class='columns'>
				<div class='left-frame'>
					<div class='link-window'> <!-- google window -->
					<label class='link-window-title'>Google</label>
					<div class='link-grid'>
    						<a href='http://gmail.com'><img class='link-icon' src='img/links/gmail.png'/> Gmail</a>
    						<a href='http://messages.google.com'><img class='link-icon' src='img/links/message.png'/> Messages</a>
    						<a href='http://calendar.google.com'><img class='link-icon' src='img/links/calendar.png'/> Calendar</a>
    						<a href='http://contacts.google.com'><img class='link-icon' src='img/links/contacts.png'/> Contacts</a>
    						<a href='http://keep.google.com'><img class='link-icon' src='img/links/keep.png'/> Keep</a>
    						<a href='http://familylink.google.com'><img class='link-icon' src='img/links/family.png'/> Family Link</a>
    						<a href='http://drive.google.com'><img class='link-icon' src='img/links/drive.png'/> Drive</a>
    						<a href='http://google.com/maps'><img class='link-icon' src='img/links/maps.png'/> Maps</a>
					</div>
					</div>
					<div class='link-window'> <!-- streaming window -->
						<label class='link-window-title'>Streaming</label>
						<div class='link-grid'>
    						<a href='http://paramountplus.com'><img class='link-icon' src='img/links/paramount.png'/> Paramount</a>
    						<a href='http://hulu.com'><img class='link-icon' src='img/links/hulu.png'/> Hulu</a>
    						<a href='http://amazon.com/gp/video/storefront'><img class='link-icon' src='img/links/prime.png'/> Prime Video</a>
    						<a href='http://max.com'><img class='link-icon' src='img/links/max.png'/> HBO</a>
    						<a href='http://crunchyroll.com'><img class='link-icon' src='img/links/crunchy.png'/> Crunchy Roll</a>
    						<a href='http://plutotv.com'><img class='link-icon' src='img/links/pluto.png'/> Pluto TV</a>
    						<a href='http://therokuchannel.roku.com'><img class='link-icon' src='img/links/roku.png'/> Roku</a>
						</div>
					</div>
				</div>
				<div class='mid-frame'>
					<div class='link-window'> <!-- dnd window -->
						<label class='link-window-title'>D&D</label>
						<a href='http://dndbeyond.com'><img class='link-icon' src='img/links/beyond.png'/> D&D Beyond</a>
						<a href='http://jmjr97.github.io/dm-tools/index.html'><img class='link-icon' src='img/links/dm.png'/> DM Tools</a>
						<div class='character-grid'>
							<a href='https://www.dndbeyond.com/characters/144566959'> Xyther </a>
							<a href='https://www.dndbeyond.com/characters/150936279'> Felin </a>
							<a href='https://www.dndbeyond.com/characters/120891087'> Qoma </a>
						</div>
					</div>
					<div class='link-window'> <!-- gaming window -->
						<label class='link-window-title'>Gaming</label>
						<a href='http://steampowered.com'>
							<img class='link-icon' src='img/links/steam.png'/>
							Steam
						</a>
						<a href='http://protondb.com'>
							<img class='link-icon' src='img/links/proton.png'/>
							ProtonDB
						</a>
						<a href='http://nintendo.com'>
							<img class='link-icon' src='img/links/nintendo.png'/>
							Nintendo
						</a>
					</div>
				</div>
				<div class='right-frame'>
					<div class='link-window'>
						<label class='link-window-title'>Linux</label>
						<a href='http://archlinux.org'><img class='link-icon' src='img/links/arch1.png'/> Arch Linux</a>
						<a href='http://wiki.archlinux.org'><img class='link-icon' src='img/links/arch2.png'/> Arch Wiki</a>
					</div>
					<div class='link-window'>
						<label class='link-window-title'>School</label>
						<a href='http://www.bcps.org'><img class='link-icon' src='img/links/bcps.png'/> BCPS</a>
						<a href='https://chesapeakehs.bcps.org/'><img class='link-icon' src='img/links/chs.png'/> Chesapeake High</a>
						<a href='https://bcps.schoology.com/'><img class='link-icon' src='img/links/schoology.png'/> Schoology</a>
						<a href='https://buswhere.com'><img class='link-icon' src='img/links/bus.png'/> BusWhere</a>
					</div>
				</div>
			</div>
		</div>
	</body>
</html>
